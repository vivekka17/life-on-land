<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life on Land - Splash Screen</title>
    <meta http-equiv="refresh" content="4; url=home.html">
    <link rel="stylesheet" href="css/template_style.css">
    <link rel="stylesheet" href="css/splash.css">

  <script>
    setTimeout(() => {
      document.querySelector(".splash-container").style.opacity = "0"; 
      setTimeout(() => {
        window.location.href = "home.html"; 
      }, 1000);

  <body>

      <h1 class="splash-title">Life on Land</h1>
      <p class="splash-mission">
        <h2>Empowering Communities Through Sustainable Land Conservation.</h2>
      </p>
      <p class="group-members">
         Team Members: Vivekka, Jalani, Sithuli, Sanupa 
      </p>
      <div class="loader"></div>
    </div>
  </body>
</html>
